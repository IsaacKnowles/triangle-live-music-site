server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Data files: never cache so clients always get fresh events
    location ~* \.(json)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Everything else
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
