<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triangle Live Music</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='20' fill='%23e8e0d0'>♪</text></svg>">
  <meta name="description" content="Live music events happening in the Raleigh-Durham-Chapel Hill Triangle area. Find shows, venues, and door times.">
  <meta name="keywords" content="Triangle live music, Raleigh concerts, Durham shows, Chapel Hill venues, NC live music">
  <meta property="og:title" content="Triangle Live Music">
  <meta property="og:description" content="Live music events happening in the Raleigh-Durham-Chapel Hill Triangle area.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nctrianglemusic.live">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Triangle Live Music">
  <meta name="twitter:description" content="Live music events happening in the Raleigh-Durham-Chapel Hill Triangle area.">
  <link rel="canonical" href="https://nctrianglemusic.live">
  <style>
    :root {
      --bg: #0e0e14;
      --surface: #161620;
      --card: #1e1e2c;
      --border: #2a2a3c;
      --text: #e2e2ec;
      --text-muted: #7878a0;
      --text-dim: #4a4a68;
      --accent: #8b7cf8;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --sticky-top: 0px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header .subtitle {
      color: var(--text-muted);
      font-size: 13px;
    }
    .event-count {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Controls ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .controls-top {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      flex-shrink: 0;
      width: 34px;
    }

    .city-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .venue-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
    }

    /* ── Mobile venue dropdown ── */
    .venue-dropdown { display: none; position: relative; }
    .venue-dropdown-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    .venue-dropdown-btn:hover { opacity: 0.85; }
    .venue-dropdown-count {
      background: var(--border);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
    }
    .venue-dropdown-panel {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
      z-index: 20;
      max-height: 60vh;
      overflow-y: auto;
    }
    .venue-dropdown-panel.open { display: flex; }
    .venue-check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 3px 2px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .venue-check-item input[type="checkbox"] {
      accent-color: var(--accent);
      flex-shrink: 0;
    }
    .venue-check-item .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .venue-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      background: var(--card);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .venue-chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .venue-chip.active {
      background: color-mix(in srgb, var(--chip-color) 15%, transparent);
      border-color: var(--chip-color);
      color: var(--chip-color);
    }
    .venue-chip:hover { opacity: 0.85; }
    .venue-chip.dimmed { opacity: 0.35; }

    .city-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      background: var(--card);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .city-chip.active {
      border-color: var(--text-muted);
      color: var(--text);
    }
    .city-chip:hover { opacity: 0.85; }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .view-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .view-btn:hover { color: var(--text); }
    .view-btn.active {
      background: var(--border);
      color: var(--text);
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .btn-text {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .btn-text:hover { color: var(--text); }

    .search-input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 5px 10px;
      width: 180px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }

    /* ── Main ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 0;
    }

    /* ── List view: date groups ── */
    .date-group { margin-bottom: 32px; }

    .date-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      position: sticky;
      top: var(--sticky-top);
      z-index: 5;
      background: var(--bg);
      padding: 6px 0 4px;
    }
    .date-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .date-label.today { color: var(--accent); }
    .date-label.past  { color: var(--text-dim); }
    .date-line { flex: 1; height: 1px; background: var(--border); }
    .date-count { font-size: 11px; color: var(--text-dim); }

    /* ── Event card ── */
    .event-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: auto auto 1fr;
      gap: 0 14px;
      align-items: start;
      transition: border-color 0.15s;
    }
    .event-card:hover {
      border-color: color-mix(in srgb, var(--venue-color, var(--border)) 50%, var(--border));
    }
    .event-card.past { opacity: 0.45; }

    .venue-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--venue-color, var(--text-dim));
      align-self: stretch;
      min-height: 18px;
    }

    .event-body { min-width: 0; }

    .event-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }

    .venue-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--venue-color, var(--text-muted));
      flex-shrink: 0;
    }

    .event-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
    }
    .event-title a { color: inherit; text-decoration: none; }
    .event-title a:hover { text-decoration: underline; }

    .event-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
    }
    .presenter {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    .music-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .music-link {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .music-link:hover         { color: var(--text); border-color: var(--text-muted); }
    .music-link.spotify:hover { color: #1DB954; border-color: #1DB954; }
    .music-link.youtube:hover { color: #FF0000; border-color: #FF0000; }
    .music-link.bandcamp:hover{ color: #1da0c3; border-color: #1da0c3; }
    .music-link.website:hover { color: var(--accent); border-color: var(--accent); }
    .music-link.soundcloud:hover { color: #ff5500; border-color: #ff5500; }

    .event-time-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;
      padding-right: 12px;
      border-right: 1px solid var(--border);
      min-width: 48px;
      width: 48px;
      flex-shrink: 0;
      gap: 5px;
    }
    .time-display {
      position: relative;
      display: inline-block;
      line-height: 1;
      padding-right: 16px;
    }
    .time-hour {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      display: block;
    }
    .time-mins {
      position: absolute;
      top: 1px;
      right: 0;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .time-ampm {
      position: absolute;
      bottom: 1px;
      right: 0;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      line-height: 1;
      text-transform: lowercase;
    }
    .time-doors {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      text-align: right;
      line-height: 1.2;
    }
    .event-admission { font-size: 12px; color: var(--text-muted); white-space: nowrap; margin-top: 4px; }

    /* ── Calendar view ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .cal-nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
      padding-bottom: 2px;
    }
    .cal-nav-btn:hover { border-color: var(--text-muted); }
    .cal-month-label {
      font-size: 18px;
      font-weight: 600;
      min-width: 190px;
      text-align: center;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 20px;
    }
    .cal-dow {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 6px 0 8px;
    }
    .cal-day {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 7px 7px;
      min-height: 76px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: border-color 0.15s, background 0.15s;
    }
    .cal-day.has-events {
      cursor: pointer;
    }
    .cal-day.has-events:hover {
      border-color: var(--text-dim);
    }
    .cal-day.empty {
      background: none;
      border-color: transparent;
    }
    .cal-day.past { opacity: 0.4; }
    .cal-day.today { border-color: var(--accent) !important; }
    .cal-day.selected {
      border-color: var(--accent) !important;
      background: color-mix(in srgb, var(--accent) 10%, var(--card));
    }

    .cal-day-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      line-height: 1;
    }
    .cal-day.today .cal-day-num { color: var(--accent); }
    .cal-day.selected .cal-day-num { color: var(--accent); }

    .cal-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .cal-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cal-overflow {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1;
    }

    /* ── Day panel (calendar event detail) ── */
    .day-panel {
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .day-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .day-panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .day-panel-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .day-panel-close:hover { color: var(--text); }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .controls {
        padding: 10px 12px;
      }
      .controls-top {
        flex-direction: column;
        align-items: stretch;
      }
      .city-filters {
        flex-wrap: nowrap;
      }
      .venue-filters { display: none; }
      .filter-label.venue-label { display: none; }
      .venue-dropdown { display: block; }
      .controls-right {
        width: 100%;
        flex-wrap: wrap;
      }
      main {
        padding: 16px 12px 60px;
      }
      .event-card {
        grid-template-columns: auto auto 1fr;
      }
      .event-time-block {
        min-width: 40px;
        width: 40px;
        padding-right: 8px;
        align-items: flex-end;
      }
      .time-hour { font-size: 22px; }
      .time-mins { font-size: 10px; }
      .time-ampm { font-size: 9px; }
    }

    /* ── Loading / error ── */
    #status {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }
    .error { color: #e05c5c; }
    .error code {
      display: block;
      font-family: monospace;
      background: var(--card);
      padding: 12px;
      border-radius: var(--radius);
      margin-top: 12px;
      text-align: left;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<header>
  <h1>Triangle Live Music</h1>
  <span class="subtitle">Triangle NC</span>
  <span class="event-count" id="event-count"></span>
</header>

<div class="controls" id="controls">
  <div class="filter-row">
    <span class="filter-label">City</span>
    <div class="city-filters" id="city-filters"></div>
  </div>
  <div class="controls-top">
    <div class="filter-row" style="flex:1;min-width:0">
      <span class="filter-label venue-label">Venue</span>
      <div class="venue-filters" id="venue-filters"></div>
      <div class="venue-dropdown" id="venue-dropdown">
        <button class="venue-dropdown-btn" id="venue-dropdown-btn">
          Venues <span class="venue-dropdown-count" id="venue-dropdown-count"></span> &#9663;
        </button>
        <div class="venue-dropdown-panel" id="venue-dropdown-panel"></div>
      </div>
    </div>
    <div class="controls-right">
      <input class="search-input" type="search" id="search" placeholder="Search events…">
      <label class="toggle-label">
        <input type="checkbox" id="show-past">
        Show past
      </label>
      <button class="btn-text" id="all-btn">All</button>
      <button class="btn-text" id="none-btn">None</button>
      <div class="view-toggle">
        <button class="view-btn active" id="list-view-btn">List</button>
        <button class="view-btn" id="cal-view-btn">Calendar</button>
      </div>
    </div>
  </div>
</div>

<main>
  <div id="status">Loading events…</div>
  <div id="event-list" hidden></div>
</main>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const VENUE_COLORS = [
  '#f87171', // red
  '#fb923c', // orange
  '#fbbf24', // amber
  '#a3e635', // lime
  '#34d399', // emerald
  '#22d3ee', // cyan
  '#60a5fa', // blue
  '#818cf8', // indigo
  '#c084fc', // purple
  '#f472b6', // pink
  '#e879f9', // fuchsia
  '#4ade80', // green
];

const VENUE_CITY = {
  'kings':           'Raleigh',
  'neptunes':        'Raleigh',
  'chapel-of-bones': 'Raleigh',
  'slims':           'Raleigh',
  'lincoln-theatre': 'Raleigh',
  'bowstring':       'Raleigh',
  'motorco':         'Durham',
  'pinhook':         'Durham',
  'the-fruit':       'Durham',
  'sharp-9':         'Durham',
  'local-506':       'Chapel Hill',
  'cats-cradle':     'Chapel Hill',
};
const CITIES = ['Raleigh', 'Durham', 'Chapel Hill'];

const LINK_ICONS  = { spotify: '♫', youtube: '▶', bandcamp: 'bc', website: '↗', soundcloud: '☁' };
const LINK_LABELS = { spotify: 'Spotify', youtube: 'YouTube', bandcamp: 'Bandcamp', website: 'Website', soundcloud: 'SoundCloud' };
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_LABELS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// ── State ─────────────────────────────────────────────────────────────────────
let allEvents    = [];
let venueColors  = {};
let venueNames   = [];
let activeVenues = new Set();
let activeCities = new Set(CITIES);
let showPast     = false;
let searchQuery  = '';
let viewMode     = 'list';   // 'list' | 'calendar'

const now = new Date();
let calYear  = now.getFullYear();
let calMonth = now.getMonth();   // 0-based
let selectedDate = null;         // 'YYYY-MM-DD' or null

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData() {
  // Production: data inlined by Worker at request time
  if (window.__EVENTS__) return window.__EVENTS__;
  // Local dev fallback: fetch from disk via serve.py
  const res = await fetch('./live_music_events.json');
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching live_music_events.json`);
  return res.json();
}

function processData(data) {
  const venueKeys = Object.keys(data.venues);
  venueKeys.forEach((key, i) => {
    venueColors[key] = VENUE_COLORS[i % VENUE_COLORS.length];
    venueNames.push({ key, name: data.venues[key].name });
    activeVenues.add(key);
  });

  const events = [];
  for (const [key, venue] of Object.entries(data.venues)) {
    for (const e of (venue.events || [])) {
      events.push({ ...e, venueKey: key, venueName: venue.name, venueColor: venueColors[key] });
    }
  }
  events.sort((a, b) => (a.start_datetime || '').localeCompare(b.start_datetime || ''));
  return events;
}

// ── Date helpers ──────────────────────────────────────────────────────────────
const TODAY_STR = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local

function eventDateStr(e) { return (e.start_datetime || '').slice(0, 10); }
function isPast(e)        { return eventDateStr(e) < TODAY_STR; }
function isToday(ds)      { return ds === TODAY_STR; }

function formatDateHeader(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function zeroPad(n) { return String(n).padStart(2, '0'); }

// ── Filtering ─────────────────────────────────────────────────────────────────
function getFilteredEvents() {
  return allEvents.filter(e => {
    if (!activeVenues.has(e.venueKey)) return false;
    const city = VENUE_CITY[e.venueKey];
    if (city && !activeCities.has(city)) return false;
    if (!showPast && isPast(e)) return false;
    if (searchQuery) {
      const hay = [e.title, e.subtitle, e.presenter, e.venueName].join(' ').toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });
}

// ── Group by date helper ──────────────────────────────────────────────────────
function groupByDate(events) {
  const map = new Map();
  for (const e of events) {
    const ds = eventDateStr(e);
    if (!map.has(ds)) map.set(ds, []);
    map.get(ds).push(e);
  }
  return map;
}

// ── List view ─────────────────────────────────────────────────────────────────
function renderList(filtered) {
  if (filtered.length === 0) {
    return '<div class="empty-state">No events match your filters.</div>';
  }
  const byDate = groupByDate(filtered);
  return [...byDate].map(([dateStr, events]) => {
    const past  = dateStr < TODAY_STR;
    const today = isToday(dateStr);
    const label = today ? 'Today — ' + formatDateHeader(dateStr) : formatDateHeader(dateStr);
    const cls   = today ? 'date-label today' : past ? 'date-label past' : 'date-label';
    return `
      <div class="date-group">
        <div class="date-header">
          <span class="${cls}">${label}</span>
          <span class="date-line"></span>
          <span class="date-count">${events.length}</span>
        </div>
        ${events.map(renderCard).join('')}
      </div>`;
  }).join('');
}

// ── Calendar view ─────────────────────────────────────────────────────────────
function renderCalendar(filtered) {
  const byDate = groupByDate(filtered);

  // Month grid math
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  let firstDow = new Date(calYear, calMonth, 1).getDay(); // 0 = Sun
  firstDow = (firstDow + 6) % 7; // shift to Mon = 0

  // Nav
  let html = `
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
      <span class="cal-month-label">${MONTH_NAMES[calMonth]} ${calYear}</span>
      <button class="cal-nav-btn" id="cal-next">&#8250;</button>
    </div>
    <div class="cal-grid">
      ${DOW_LABELS.map(d => `<div class="cal-dow">${d}</div>`).join('')}
      ${Array(firstDow).fill('<div class="cal-day empty"></div>').join('')}`;

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${zeroPad(calMonth + 1)}-${zeroPad(d)}`;
    const events  = byDate.get(dateStr) || [];
    const past     = dateStr < TODAY_STR;
    const today    = dateStr === TODAY_STR;
    const selected = dateStr === selectedDate;

    let cls = 'cal-day';
    if (past)          cls += ' past';
    if (today)         cls += ' today';
    if (selected)      cls += ' selected';
    if (events.length) cls += ' has-events';

    const MAX_DOTS = 9;
    const dots = events.slice(0, MAX_DOTS).map(e =>
      `<span class="cal-dot" style="background:${e.venueColor}" title="${esc(e.venueName)}: ${esc(e.title)}"></span>`
    ).join('');
    const overflow = events.length > MAX_DOTS
      ? `<div class="cal-overflow">+${events.length - MAX_DOTS}</div>` : '';

    html += `
      <div class="${cls}" data-date="${dateStr}">
        <div class="cal-day-num">${d}</div>
        <div class="cal-dots">${dots}</div>
        ${overflow}
      </div>`;
  }

  html += '</div>'; // close cal-grid

  // Day panel
  if (selectedDate && byDate.has(selectedDate)) {
    const selEvents = byDate.get(selectedDate);
    html += `
      <div class="day-panel">
        <div class="day-panel-header">
          <span class="day-panel-title">${formatDateHeader(selectedDate)}</span>
          <button class="day-panel-close" id="day-panel-close">&#215;</button>
        </div>
        ${selEvents.map(renderCard).join('')}
      </div>`;
  }

  return html;
}

// ── Main render dispatcher ────────────────────────────────────────────────────
function renderEvents() {
  const list     = document.getElementById('event-list');
  const filtered = getFilteredEvents();

  document.getElementById('event-count').textContent =
    `${filtered.length} event${filtered.length !== 1 ? 's' : ''}`;

  list.innerHTML = viewMode === 'calendar'
    ? renderCalendar(filtered)
    : renderList(filtered);

  // Attach calendar event listeners after innerHTML set
  if (viewMode === 'calendar') {
    document.getElementById('cal-prev').addEventListener('click', () => {
      calMonth--;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      selectedDate = null;
      renderEvents();
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      calMonth++;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      selectedDate = null;
      renderEvents();
    });
    document.querySelectorAll('.cal-day.has-events').forEach(cell => {
      cell.addEventListener('click', () => {
        const date = cell.dataset.date;
        selectedDate = (selectedDate === date) ? null : date;
        renderEvents();
      });
    });
    const closeBtn = document.getElementById('day-panel-close');
    if (closeBtn) {
      closeBtn.addEventListener('click', () => { selectedDate = null; renderEvents(); });
    }
  }
}

// ── Card renderers ────────────────────────────────────────────────────────────
function renderCard(e) {
  const color        = e.venueColor;
  const pastCls      = isPast(e) ? ' past' : '';
  const subtitleHtml = e.subtitle   ? `<div class="event-subtitle">${esc(e.subtitle)}</div>` : '';
  const presenterHtml= e.presenter  ? `<span class="presenter">${esc(e.presenter)}</span>` : '';
  const admissionHtml= e.admission  ? `<div class="event-admission">${esc(e.admission)}</div>` : '';
  const linksHtml    = renderMusicLinks(e.music_links || {});

  const parsed = parseTime(e.time);
  const timeInnerHtml = parsed
    ? `<div class="time-display">
        <span class="time-hour">${esc(parsed.hour)}</span>
        <span class="time-mins">${esc(parsed.mins)}</span>
        <span class="time-ampm">${esc(parsed.ampm)}</span>
       </div>`
    : `<div class="time-display"><span class="time-hour" style="font-size:13px">${esc(e.time || '—')}</span></div>`;

  const doorsHtml = (e.doors && e.doors !== e.time)
    ? `<div class="time-doors"><span style="font-size:8px;opacity:0.9;letter-spacing:0.05em;text-transform:uppercase;">doors</span><br>${esc(e.doors)}</div>`
    : '';

  return `
    <div class="event-card${pastCls}" style="--venue-color:${color}">
      <div class="event-time-block">
        ${timeInnerHtml}
        ${doorsHtml}
      </div>
      <div class="venue-bar"></div>
      <div class="event-body">
        <div class="event-top"><span class="venue-badge">${esc(e.venueName)}</span></div>
        <div class="event-title">
          ${e.event_url
            ? `<a href="${esc(e.event_url)}" target="_blank" rel="noopener">${esc(e.title)}</a>`
            : esc(e.title)}
        </div>
        ${subtitleHtml}
        ${presenterHtml ? `<div class="event-meta">${presenterHtml}</div>` : ''}
        ${admissionHtml}
        ${linksHtml}
      </div>
    </div>`;
}

function renderMusicLinks(links) {
  const items = Object.entries(links)
    .filter(([, url]) => url)
    .map(([platform, url]) => {
      const icon  = LINK_ICONS[platform]  || '↗';
      const label = LINK_LABELS[platform] || platform;
      return `<a class="music-link ${platform}" href="${esc(url)}" target="_blank" rel="noopener">${icon} ${label}</a>`;
    });
  return items.length ? `<div class="music-links">${items.join('')}</div>` : '';
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function parseTime(str) {
  if (!str) return null;
  const m = String(str).match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!m) return null;
  return { hour: m[1], mins: m[2], ampm: m[3].toLowerCase() };
}

// ── Venue filters ─────────────────────────────────────────────────────────────
function buildVenueFilters() {
  const container = document.getElementById('venue-filters');
  for (const { key, name } of venueNames) {
    const color = venueColors[key];
    const chip  = document.createElement('button');
    chip.className = 'venue-chip active';
    chip.dataset.key = key;
    chip.style.setProperty('--chip-color', color);
    chip.innerHTML = `<span class="dot" style="background:${color}"></span>${name}`;
    chip.addEventListener('click', () => {
      activeVenues.has(key) ? activeVenues.delete(key) : activeVenues.add(key);
      chip.classList.toggle('active', activeVenues.has(key));
      renderEvents();
    });
    container.appendChild(chip);
  }
}

// ── Mobile venue dropdown ─────────────────────────────────────────────────────
function buildVenueDropdown() {
  const panel = document.getElementById('venue-dropdown-panel');
  for (const { key, name } of venueNames) {
    const color = venueColors[key];
    const label = document.createElement('label');
    label.className = 'venue-check-item';
    label.dataset.key = key;
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = activeVenues.has(key);
    cb.addEventListener('change', () => {
      cb.checked ? activeVenues.add(key) : activeVenues.delete(key);
      // sync desktop chip
      const chip = document.querySelector(`.venue-chip[data-key="${key}"]`);
      if (chip) chip.classList.toggle('active', cb.checked);
      updateVenueDropdownCount();
      renderEvents();
    });
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = color;
    label.appendChild(cb);
    label.appendChild(dot);
    label.appendChild(document.createTextNode(name));
    panel.appendChild(label);
  }
  updateVenueDropdownCount();

  document.getElementById('venue-dropdown-btn').addEventListener('click', e => {
    e.stopPropagation();
    panel.classList.toggle('open');
  });

  document.addEventListener('click', () => { panel.classList.remove('open'); });
  panel.addEventListener('click', e => e.stopPropagation());
}

function updateVenueDropdownCount() {
  const total  = venueNames.length;
  const active = venueNames.filter(({ key }) => activeVenues.has(key)).length;
  document.getElementById('venue-dropdown-count').textContent = `${active}/${total}`;
}

function syncVenueDropdownCheckboxes() {
  document.querySelectorAll('#venue-dropdown-panel .venue-check-item').forEach(label => {
    const key = label.dataset.key;
    const cb  = label.querySelector('input[type="checkbox"]');
    if (cb) cb.checked = activeVenues.has(key);
  });
  updateVenueDropdownCount();
}

// ── City filters ──────────────────────────────────────────────────────────────
function buildCityFilters() {
  const container = document.getElementById('city-filters');
  for (const city of CITIES) {
    const chip = document.createElement('button');
    chip.className = 'city-chip active';
    chip.dataset.city = city;
    chip.textContent = city;
    chip.addEventListener('click', () => {
      if (activeCities.has(city)) {
        activeCities.delete(city);
        chip.classList.remove('active');
      } else {
        activeCities.add(city);
        chip.classList.add('active');
      }
      updateVenueChipDim();
      renderEvents();
    });
    container.appendChild(chip);
  }
}

function updateVenueChipDim() {
  document.querySelectorAll('.venue-chip').forEach(chip => {
    const key  = chip.dataset.key;
    const city = VENUE_CITY[key];
    const cityOff = city && !activeCities.has(city);
    chip.classList.toggle('dimmed', cityOff);
  });
}

// ── Sticky top measurement ────────────────────────────────────────────────────
function updateStickyTop() {
  const h = document.getElementById('controls').offsetHeight;
  document.documentElement.style.setProperty('--sticky-top', h + 'px');
}

// ── Control wiring ────────────────────────────────────────────────────────────
document.getElementById('show-past').addEventListener('change', e => {
  showPast = e.target.checked;
  renderEvents();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderEvents();
});

document.getElementById('all-btn').addEventListener('click', () => {
  CITIES.forEach(c => activeCities.add(c));
  document.querySelectorAll('.city-chip').forEach(c => c.classList.add('active'));
  venueNames.forEach(({ key }) => activeVenues.add(key));
  document.querySelectorAll('.venue-chip').forEach(c => { c.classList.add('active'); c.classList.remove('dimmed'); });
  syncVenueDropdownCheckboxes();
  renderEvents();
});

document.getElementById('none-btn').addEventListener('click', () => {
  activeCities.clear();
  document.querySelectorAll('.city-chip').forEach(c => c.classList.remove('active'));
  activeVenues.clear();
  document.querySelectorAll('.venue-chip').forEach(c => { c.classList.remove('active'); c.classList.add('dimmed'); });
  syncVenueDropdownCheckboxes();
  renderEvents();
});

document.getElementById('list-view-btn').addEventListener('click', () => {
  viewMode = 'list';
  document.getElementById('list-view-btn').classList.add('active');
  document.getElementById('cal-view-btn').classList.remove('active');
  renderEvents();
});

document.getElementById('cal-view-btn').addEventListener('click', () => {
  viewMode = 'calendar';
  document.getElementById('cal-view-btn').classList.add('active');
  document.getElementById('list-view-btn').classList.remove('active');
  // Jump to the first month that has upcoming events if we're far out
  renderEvents();
});

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  const status = document.getElementById('status');
  const list   = document.getElementById('event-list');
  try {
    allEvents = processData(await loadData());
    status.hidden = true;
    list.hidden   = false;
    buildCityFilters();
    buildVenueFilters();
    buildVenueDropdown();
    renderEvents();
    requestAnimationFrame(updateStickyTop);
    new ResizeObserver(updateStickyTop).observe(document.getElementById('controls'));
  } catch (err) {
    status.innerHTML = `
      <div class="error">
        <strong>Could not load live_music_events.json</strong><br>
        Browsers block file:// fetches. Serve this folder over HTTP:<br>
        <code>python3 -m http.server 8080</code>
        Then open <strong>http://localhost:8080</strong>
        <br><br><small>${esc(err.message)}</small>
      </div>`;
  }
})();
</script>
</body>
</html>
