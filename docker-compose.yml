services:
  live-music:
    build: .
    ports:
      - "8080:80"
    volumes:
      # Local data file (remove this when switching to an external data_url in config.json)
      - ./live_music_events.json:/usr/share/nginx/html/live_music_events.json:ro
      # Override config.json to change data source without rebuilding the image
      - ./config.json:/usr/share/nginx/html/config.json:ro
    restart: unless-stopped
